openapi: 3.1.0
info:
  title: Finnhub Company News API
  description: Free realtime APIs for stocks, forex, and cryptocurrency, plus company fundamentals, economic data, and alternative data. All endpoints require an API token passed via the `token` query parameter (or `X-Finnhub-Token` header).
  version: '1.0'
  contact:
    name: Finnhub
    url: https://finnhub.io/docs/api
servers:
- url: https://finnhub.io/api/v1
  description: Production
security:
- tokenQuery: []
- tokenHeader: []
tags:
- name: News
paths:
  /news:
    get:
      summary: General market news
      operationId: marketNews
      parameters:
      - name: category
        in: query
        required: true
        schema:
          type: string
          enum:
          - general
          - forex
          - crypto
          - merger
      - name: minId
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: News list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
      tags:
      - News
components:
  securitySchemes:
    tokenQuery:
      type: apiKey
      in: query
      name: token
    tokenHeader:
      type: apiKey
      in: header
      name: X-Finnhub-Token
